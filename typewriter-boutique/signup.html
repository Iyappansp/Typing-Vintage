<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — KeyLegacy</title>
  <link rel="icon" href="assets/favicon.png" type="image/png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="assets/css/style.css" rel="stylesheet"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(circle at 70% 30%, rgba(124,58,237,0.05) 0%, transparent 60%);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 10;
    }
    .social-login-btn {
      width: 100%; padding: 12px; border-radius: 8px;
      background: var(--bg-tertiary); border: 1px solid var(--glass-border);
      color: var(--text-secondary); font-size: .88rem; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      white-space: nowrap;
    }
    .social-login-btn:hover { border-color: var(--purple); color: var(--text-primary); }
    .divider-or {
      display: flex; align-items: center; gap: 12px; margin: 24px 0;
      font-size: .78rem; color: var(--text-muted);
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px; background: var(--glass-border);
    }
  </style>
</head>
<body>
<div id="page-loader"><span class="loader-text">KEY LEGACY</span></div>



<!-- ░░ HEADER ░░ -->
<div class="header-top">
  <div class="container-custom">
    <!-- Left: Logo -->
    <a href="index.html" class="logo-mini">
      <img src="assets/logo.png" alt="KeyLegacy Logo" class="logo-img">
    </a>

    <!-- Center: Links -->
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="home-2.html">Home-2</a>
      <a href="gallery.html">Collection</a>
      <a href="product-view.html">Showcase</a>
      <a href="restoration-process.html">Restoration</a>
      <a href="appraisal-services.html">Appraisal</a>
      <a href="contact.html">Contact</a>
      <!-- Mobile Auth Stack -->
      <div class="mobile-auth-stack">
        <a href="signup.html" class="auth-btn btn-signup active">Sign Up</a>
        <a href="login.html" class="auth-btn btn-login">Login</a>
        <div class="d-flex justify-content-center gap-3 mt-2">
           <button class="nav-icon-btn" onclick="document.getElementById('rtl-toggle').click()"><i class="fas fa-exchange-alt"></i></button>
           <button class="nav-icon-btn" onclick="document.getElementById('theme-toggle').click()"><i class="fas fa-adjust"></i></button>
        </div>
      </div>
    </div>
    
    <!-- Mobile Toggle -->
    <button class="mobile-nav-toggle">
      <i class="fas fa-bars"></i>
    </button>

    <!-- Right: Controls & Buttons -->
    <div class="nav-controls">
      <a href="signup.html" class="auth-btn btn-signup active">Sign Up</a>
      <a href="login.html" class="auth-btn btn-login">Login</a>
      <div class="divider"></div>
      <button class="nav-icon-btn" id="rtl-toggle" title="RTL/LTR"><span id="rtl-icon">⇄ RTL</span></button>
      <button class="nav-icon-btn" id="theme-toggle" title="Toggle Theme"><span id="theme-icon">☀️</span></button>
    </div>
  </div>
</div>
<!-- ░░ END HEADER ░░ -->

<div class="auth-page">
  <div class="auth-card" data-aos="fade-up">
    <div class="card-glass p-5">
      <!-- Logo -->
      <div class="text-center mb-4">
        <a href="index.html" style="display: inline-block;">
          <img src="assets/logo.png" alt="KeyLegacy Logo" style="height: 70px; margin: 0 auto; cursor: pointer;">
        </a>
      </div>

      <div class="text-center mb-4">
        <h2 style="font-size:1.8rem; font-weight:800; margin-bottom:8px;">Create <span class="text-grad">Account</span></h2>
        <p style="font-size:.85rem; color:var(--text-secondary);">Join our community of typewriter enthusiasts.</p>
      </div>

      <!-- Social logins -->
      <div class="row g-3 mb-4">
        <div class="col-12">
          <button class="social-login-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
        </div>
        <div class="col-12">
          <button class="social-login-btn">
            <i class="fab fa-apple" style="font-size:1.1rem;"></i>
            Continue with Apple
          </button>
        </div>
      </div>

      <div class="divider-or">or sign up with email</div>

      <form action="#">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-lbl">First Name</label>
            <input type="text" class="form-ctrl" placeholder="John" required/>
          </div>
          <div class="col-md-6">
            <label class="form-lbl">Last Name</label>
            <input type="text" class="form-ctrl" placeholder="Doe" required/>
          </div>
          <div class="col-12">
            <label class="form-lbl">Email Address</label>
            <input type="email" class="form-ctrl" placeholder="your@email.com" required/>
          </div>
          <div class="col-12">
            <label class="form-lbl">Password</label>
            <input type="password" class="form-ctrl" placeholder="••••••••" required/>
          </div>
          <div class="col-12 mt-4">
            <button type="submit" class="btn-grad w-100 justify-content-center" style="padding: 14px;">Create Account</button>
          </div>
        </div>
      </form>

      <div class="text-center mt-4">
        <p style="font-size:.85rem; color:var(--text-secondary);">Already have an account? <a href="login.html" style="color:var(--purple-light); font-weight:600;">Sign In</a></p>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 700, once: true });</script>
<script src="assets/js/main.js"></script>
</body>
</html>
