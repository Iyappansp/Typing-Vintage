<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — KeyLegacy</title>
  <link rel="icon" href="assets/favicon.png" type="image/png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="assets/css/style.css" rel="stylesheet"/>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 40px 16px;
    }
    .login-bg {
      position: fixed; inset: 0;
      background: var(--bg-primary);
    }
    .login-grid {
      position: fixed; inset: 0; opacity: .03;
      background-image: linear-gradient(var(--glass-border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .login-card { max-width: 440px; width: 100%; }
    .login-logo {
      font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 800;
      text-align: center; margin-bottom: 8px;
    }
    .login-sub { font-size: .85rem; color: var(--text-muted); text-align: center; margin-bottom: 36px; }
    .divider-or {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
      font-size: .78rem; color: var(--text-muted);
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px; background: var(--glass-border);
    }
    .social-login-btn {
      width: 100%; padding: 12px; border-radius: 8px;
      background: var(--bg-tertiary); border: 1px solid var(--glass-border);
      color: var(--text-secondary); font-size: .88rem; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      white-space: nowrap;
    }
    .social-login-btn:hover { border-color: var(--purple); color: var(--text-primary); }
    .floating-badge {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      padding: 12px 16px; font-size: .8rem; color: var(--text-secondary);
      animation: float 3s ease-in-out infinite;
      display: flex; align-items: center; gap: 8px;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .pass-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0; font-size: .9rem; transition: var(--transition);
    }
    .pass-toggle:hover { color: var(--text-primary); }
    .input-wrap { position: relative; }
  </style>
</head>
<body>
<div id="page-loader"><span class="loader-text">KEY LEGACY</span></div>

<!-- ░░ HEADER ░░ -->
<div class="header-top">
  <div class="container-custom">
    <!-- Left: Logo -->
    <a href="index.html" class="logo-mini">
      <img src="assets/logo.png" alt="KeyLegacy Logo" class="logo-img">
    </a>

    <!-- Center: Links -->
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="home-2.html">Home-2</a>
      <a href="gallery.html">Collection</a>
      <a href="product-view.html">Showcase</a>
      <a href="restoration-process.html">Restoration</a>
      <a href="appraisal-services.html">Appraisal</a>
      <a href="contact.html">Contact</a>
      <!-- Mobile Auth Stack -->
      <div class="mobile-auth-stack">
        <a href="signup.html" class="auth-btn btn-signup">Sign Up</a>
        <a href="login.html" class="auth-btn btn-login active">Login</a>
        <div class="d-flex justify-content-center gap-3 mt-2">
           <button class="nav-icon-btn" onclick="document.getElementById('rtl-toggle').click()"><i class="fas fa-exchange-alt"></i></button>
           <button class="nav-icon-btn" onclick="document.getElementById('theme-toggle').click()"><i class="fas fa-adjust"></i></button>
        </div>
      </div>
    </div>
    
    <!-- Mobile Toggle -->
    <button class="mobile-nav-toggle">
      <i class="fas fa-bars"></i>
    </button>

    <!-- Right: Controls & Buttons -->
    <div class="nav-controls">
      <a href="signup.html" class="auth-btn btn-signup">Sign Up</a>
      <a href="login.html" class="auth-btn btn-login active">Login</a>
      <div class="divider"></div>
      <button class="nav-icon-btn" id="rtl-toggle" title="RTL/LTR"><span id="rtl-icon">⇄ RTL</span></button>
      <button class="nav-icon-btn" id="theme-toggle" title="Toggle Theme"><span id="theme-icon">☀️</span></button>
    </div>
  </div>
</div>
<!-- ░░ END HEADER ░░ -->

<div class="login-bg"></div>
<div class="login-grid"></div>

<div class="login-page">
  <div class="login-card" data-aos="fade-up">
    <!-- Logo -->
    <div class="text-center mb-4">
      <a href="index.html" style="display: inline-block;">
        <img src="assets/logo.png" alt="KeyLegacy Logo" style="height: 70px; margin: 0 auto; cursor: pointer;">
      </a>
    </div>

    <!-- Title -->
    <div class="login-logo">
      <span class="text-grad">SIGN IN</span>
    </div>
    <div class="login-sub">Sign in to your collector account</div>

    <!-- Card -->
    <div class="card-glass p-5">

      <!-- Social logins -->
      <div class="row g-3 mb-4">
        <div class="col-12">
          <button class="social-login-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
        </div>
        <div class="col-12">
          <button class="social-login-btn">
            <i class="fab fa-apple" style="font-size:1.1rem;"></i>
            Continue with Apple
          </button>
        </div>
      </div>

      <div class="divider-or">or sign in with email</div>

      <!-- Form -->
      <div class="mb-3">
        <label class="form-lbl">Email Address</label>
        <input class="form-ctrl" type="email" placeholder="your@email.com"/>
      </div>
      <div class="mb-4">
        <label class="form-lbl mb-2">Password</label>
        <div class="input-wrap">
          <input class="form-ctrl" type="password" id="password-field" placeholder="••••••••" style="padding-right:44px;"/>
          <button class="pass-toggle" onclick="togglePass()"><i class="fas fa-eye" id="eye-icon"></i></button>
        </div>
      </div>

      <!-- Remember me & Forgot password -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
          <input type="checkbox" id="remember" style="width:16px;height:16px;cursor:pointer;accent-color:var(--purple);"/>
          <label for="remember" style="font-size:.82rem;color:var(--text-secondary);cursor:pointer;">Remember me on this device</label>
        </div>
        <a href="#" style="font-size:.82rem;color:var(--purple-light);text-decoration:none;">Forgot password?</a>
      </div>

      <button class="btn-grad w-100 justify-content-center" style="padding:14px;font-size:.88rem;">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>

      <div class="text-center mt-4" style="font-size:.82rem;color:var(--text-muted);">
        Don't have an account?
        <a href="signup.html" style="color:var(--purple-light);text-decoration:none;font-weight:600;">Join the Collection</a>
      </div>
    </div>

    <!-- Trust -->
    <div class="text-center mt-4">
      <span style="font-size:.72rem;color:var(--text-muted);">
        <i class="fas fa-lock me-1"></i>256-bit encrypted · Never share your data
      </span>
    </div>
  </div>
</div>

<!-- Floating badge -->

  <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:blink 2s infinite;"></span>
  <span>340+ verified collectors</span>
</div> -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 700, once: true });</script>
<script src="assets/js/main.js"></script>
<script>
  function togglePass() {
    const field = document.getElementById('password-field');
    const icon  = document.getElementById('eye-icon');
    if (field.type === 'password') {
      field.type = 'text'; icon.className = 'fas fa-eye-slash';
    } else {
      field.type = 'password'; icon.className = 'fas fa-eye';
    }
  }
</script>
</body>
</html>
